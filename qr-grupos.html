<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR Grupos – Control N°5</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; }

  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto;
    padding: 18mm 18mm 14mm 18mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    page-break-after: always;
    background: #fff;
  }

  .header { text-align: center; width: 100%; margin-bottom: 6mm; }
  .universidad { font-size: 11pt; color: #555; margin-bottom: 2mm; }
  .curso { font-size: 13pt; font-weight: bold; color: #1a0533; }
  .control-title { font-size: 22pt; font-weight: bold; color: #6c3fc5; margin: 4mm 0 2mm 0; }
  .profesor { font-size: 10pt; color: #777; }

  .grupo-badge {
    background: linear-gradient(135deg, #6c3fc5, #9b59e8);
    color: #fff;
    font-size: 36pt;
    font-weight: bold;
    border-radius: 20px;
    padding: 10mm 30mm;
    text-align: center;
    margin: 4mm 0;
    box-shadow: 0 4px 20px rgba(108,63,197,.3);
    letter-spacing: 2px;
  }

  .qr-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 4mm 0;
  }
  .qr-area img {
    width: 70mm;
    height: 70mm;
    border: 3px solid #6c3fc5;
    border-radius: 12px;
    padding: 3mm;
  }
  .url-text { font-size: 9pt; color: #555; margin-top: 3mm; word-break: break-all; text-align: center; }

  .instrucciones {
    background: #f4f0ff;
    border-left: 5px solid #6c3fc5;
    border-radius: 10px;
    padding: 6mm 8mm;
    width: 100%;
    margin: 4mm 0;
  }
  .instrucciones h3 { font-size: 11pt; color: #6c3fc5; margin-bottom: 3mm; }
  .instrucciones ol { padding-left: 16px; }
  .instrucciones li { font-size: 10pt; color: #333; margin-bottom: 2mm; line-height: 1.4; }

  .rubrica {
    background: #fff8e6;
    border: 2px solid #f7c948;
    border-radius: 10px;
    padding: 5mm 8mm;
    width: 100%;
    margin: 3mm 0;
  }
  .rubrica h3 { font-size: 11pt; color: #c09020; margin-bottom: 3mm; }
  .rubrica-table { width: 100%; border-collapse: collapse; }
  .rubrica-table th { background: #f7c948; color: #333; font-size: 9pt; padding: 4px 8px; text-align: center; }
  .rubrica-table td { font-size: 10pt; padding: 4px 8px; text-align: center; border-bottom: 1px solid #f0e0a0; }
  .rubrica-table tr:last-child td { border-bottom: none; }

  .footer { text-align: center; color: #aaa; font-size: 8pt; margin-top: 4mm; }

  @media print {
    body { background: #fff; }
    .page { margin: 0; box-shadow: none; }
  }
</style>
</head>
<body>
<script>
// QR via API pública de Google Charts
const BASE_URL = "https://kahoot-cl4.github.io/Kahoot-cl4/kahoot-grupos.html";
const grupos = [1,2,3,4,5,6];

function qrUrl(text) {
  return `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(text)}`;
}

document.addEventListener('DOMContentLoaded', function() {
  const body = document.body;
  grupos.forEach(g => {
    const url = BASE_URL + `?grupo=${g}&nocache=${Math.floor(Math.random()*99999)}`;
    const page = document.createElement('div');
    page.className = 'page';
    page.innerHTML = `
      <div class="header">
        <div class="universidad">Universidad del Pacífico</div>
        <div class="curso">Introducción al Derecho</div>
        <div class="control-title">Control de Lectura N° 5</div>
        <div class="profesor">Prof. Andrés Talavera Cano · Sección A</div>
      </div>

      <div class="grupo-badge">GRUPO ${g}</div>

      <div class="qr-area">
        <img src="${qrUrl(url)}" alt="QR Grupo ${g}" />
        <div class="url-text">${BASE_URL}</div>
      </div>

      <div class="instrucciones">
        <h3>📋 Instrucciones</h3>
        <ol>
          <li>Escanea el QR con la cámara de tu celular <strong>o ingresa al enlace</strong> indicado arriba.</li>
          <li>En la pantalla inicial, selecciona <strong>Grupo ${g}</strong>.</li>
          <li>Responde las <strong>10 preguntas</strong>. Tienes <strong>2 minutos</strong> por pregunta.</li>
          <li>Al terminar verás tu nota inmediatamente.</li>
          <li>El solucionario se muestra cuando <strong>los 6 grupos</strong> hayan completado el control.</li>
          <li>Solo hay <strong>1 intento</strong> por grupo. No cierres la página hasta finalizar.</li>
        </ol>
      </div>

      <div class="rubrica">
        <h3>📊 Rúbrica de calificación</h3>
        <table class="rubrica-table">
          <tr><th>Respuestas correctas</th><th>Nota (sobre 20)</th></tr>
          <tr><td>10 correctas</td><td><strong>20 / 20</strong></td></tr>
          <tr><td>9 correctas</td><td><strong>18 / 20</strong></td></tr>
          <tr><td>8 correctas</td><td><strong>16 / 20</strong></td></tr>
          <tr><td>7 correctas</td><td><strong>14 / 20</strong></td></tr>
          <tr><td>6 correctas</td><td><strong>12 / 20</strong></td></tr>
          <tr><td>5 correctas</td><td><strong>10 / 20</strong></td></tr>
          <tr><td>4 correctas</td><td><strong>8 / 20</strong></td></tr>
          <tr><td>3 correctas</td><td><strong>6 / 20</strong></td></tr>
          <tr><td>2 correctas</td><td><strong>4 / 20</strong></td></tr>
          <tr><td>1 correcta</td><td><strong>2 / 20</strong></td></tr>
          <tr><td>0 correctas</td><td><strong>0 / 20</strong></td></tr>
        </table>
      </div>

      <div class="footer">Control N°5 · Introducción al Derecho · Universidad del Pacífico</div>
    `;
    body.appendChild(page);
  });
});
</script>
</body>
</html>
